name: 継続的インテグレーション

on:
  push:
  pull_request:

jobs:
  verify:
    name: 静的検査と単体テスト
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得する
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: miseでNode・Bun・Go・pinactを準備する
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true
      - name: GitHub ActionsのSHA固定を検証する
        run: pinact run --fix=false --no-api
      - name: JavaScript依存関係をインストールする
        run: bun install --frozen-lockfile
      - name: TypeScriptの型を検査する
        run: bun run typecheck
      - name: Drizzle migrationを検査する
        run: bun run db:check
      - name: TypeScriptの単体テストとカバレッジ下限を検証する
        run: bun run test:coverage
      - name: TypeScriptアプリをbuildする
        run: bun run build
      - name: CDK templateを合成する
        run: bun run infra:cdk:synth -c allowedSshCidr=203.0.113.10/32 -c keyPairName=onebrc-ci >/dev/null
      - name: Goの単体テストを実行する
        run: go test ./...
      - name: Compose設定を検証する
        run: docker compose config --quiet
      - name: Ansibleをインストールする
        run: pipx install ansible-core==2.21.1
      - name: Ansible collectionをインストールする
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml
      - name: Ansible playbookの構文を検証する
        run: ansible-playbook --syntax-check -i infra/ansible/inventory.example.yml infra/ansible/playbook.yml

  compose-e2e:
    name: Compose E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONTEST_START_AT: "2020-01-01T00:00:00.000Z"
      CONTEST_END_AT: "2100-01-01T00:00:00.000Z"
    steps:
      - name: リポジトリを取得する
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: miseでNode・Bun・Go・pinactを準備する
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true
      - name: Goだけでfixtureを生成する
        run: >-
          go run ./cmd/contest_data generate
          --contest-id 1brc-trap-local
          --output data/contest
          --runner-dir data/local
          --public-rows 1000
          --private-rows 1000
          --tiers 100,1000
          --threads 2
          --revision ci
      - name: MariaDB・RustFS・計測ホストを起動する
        run: docker compose up -d --build mariadb rustfs rustfs-init benchmark-host
      - name: fixtureをRustFSへuploadする
        run: >-
          go run ./cmd/contest_data upload
          --manifest data/contest/manifest.json
          --endpoint http://localhost:9000
          --bucket onebrc-datasets
          --access-key rustfsadmin
          --secret-key rustfsadmin
          --create-bucket
      - name: アプリを起動してrunnerを待つ
        run: |
          docker compose up -d --build
          timeout 600 sh -c 'until docker compose logs benchmark-host | grep -q "Server listening"; do sleep 2; done'
          timeout 180 sh -c 'until curl -fsS http://localhost:8080/api/v1/healthz >/dev/null; do sleep 2; done'
      - name: manifestを取込みアクセスキーで提出する
        run: |
          curl -fsS -c /tmp/onebrc-cookie -o /dev/null 'http://localhost:8080/_oauth/login?redirect=/'
          curl -fsS -b /tmp/onebrc-cookie -H 'Origin: http://localhost:8080' -H 'Content-Type: application/json' --data-binary @data/contest/manifest.json http://localhost:8080/api/v1/admin/datasets/import
          key=$(curl -fsS -b /tmp/onebrc-cookie -H 'Origin: http://localhost:8080' -X POST http://localhost:8080/api/v1/access-key | jq -r .accessKey)
          response=$(curl -fsS -H "Authorization: Bearer $key" -F executionKind=typescript -F source=@baselines/ts/main.ts http://localhost:8080/api/v1/submissions)
          id=$(printf '%s' "$response" | jq -r .id)
          for attempt in $(seq 1 90); do
            state=$(curl -fsS -H "Authorization: Bearer $key" "http://localhost:8080/api/v1/submissions/$id")
            status=$(printf '%s' "$state" | jq -r .submission.status)
            [ "$status" = completed ] && break
            [ "$status" = infrastructure_error ] && { printf '%s\n' "$state"; exit 1; }
            sleep 2
          done
          test "$(printf '%s' "$state" | jq -r .submission.public.verdict)" = accepted
          test "$(docker compose exec -T mariadb mariadb -N -uonebrc -ponebrc onebrc -e "SELECT COUNT(*) FROM benchmark_runs WHERE submission_id='$id' AND verdict='accepted'")" = 6
          bun_response=$(curl -fsS -H "Authorization: Bearer $key" -F executionKind=bun -F source=@baselines/ts/main.ts http://localhost:8080/api/v1/submissions)
          bun_id=$(printf '%s' "$bun_response" | jq -r .id)
          for attempt in $(seq 1 90); do
            bun_state=$(curl -fsS -H "Authorization: Bearer $key" "http://localhost:8080/api/v1/submissions/$bun_id")
            bun_status=$(printf '%s' "$bun_state" | jq -r .submission.status)
            [ "$bun_status" = completed ] && break
            [ "$bun_status" = infrastructure_error ] && { printf '%s\n' "$bun_state"; exit 1; }
            sleep 2
          done
          test "$(printf '%s' "$bun_state" | jq -r .submission.public.verdict)" = accepted
          curl -fsSL http://localhost:8080/api/v1/datasets/public-100/input/download -o /tmp/public.zst
          test "$(sha256sum /tmp/public.zst | cut -d' ' -f1)" = "$(jq -r '.artifacts[] | select(.id == "public-100-input") | .compressedSha256' data/contest/manifest.json)"
      - name: 失敗時にlogを表示する
        if: failure()
        run: docker compose logs --no-color
      - name: Composeを停止する
        if: always()
        run: docker compose down -v
