---
- name: 1BRC専用計測ホストを構成する
  hosts: benchmark
  become: true
  vars:
    bun_version: "1.3.14"
    bun_sha256: "951ee2aee855f08595aeec6225226a298d3fea83a3dcd6465c09cbccdf7e848f"
  pre_tasks:
    - name: R2ダウンロード設定を確認する
      ansible.builtin.assert:
        that:
          - (onebrc_dataset_downloads | default({})) | length == 4
        fail_msg: "presign-runnerとconfigure-ansible.tsを実行してR2ダウンロード設定を生成してください"

    - name: Ubuntu 26.04であることを確認する
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
          - ansible_facts["distribution_version"] is version("26.04", "==")
        fail_msg: "計測ホストはUbuntu 26.04 LTSで実行する必要があります"

    - name: R2署名URLを事前確認する
      block:
        - name: R2の認可反映を待つ
          ansible.builtin.uri:
            url: "{{ onebrc_dataset_downloads['public.expected'].url }}"
            method: GET
            headers:
              Range: bytes=0-0
            return_content: false
            status_code:
              - 206
              - 403
            timeout: 30
          register: r2_download_preflight
          until: (r2_download_preflight.status | default(-1)) == 206
          retries: 20
          delay: 15
          changed_when: false
          no_log: true
      rescue:
        - name: R2署名URLの事前確認失敗を報告する
          ansible.builtin.fail:
            msg: >-
              計測ホストからR2署名URLへアクセスできません
              (HTTP {{ r2_download_preflight.status | default('接続失敗') }})。
              署名に使うR2 API tokenのObject Read権限とClient IP Address Filteringを確認し、
              計測ホストの送信元IPを許可してからpresign-runnerとconfigure-ansible.tsを再実行してください。

  tasks:
    - name: Dockerとrunnerの依存パッケージをインストールする
      ansible.builtin.apt:
        name:
          - ca-certificates
          - docker-buildx
          - docker.io
          - unzip
          - util-linux
          - xz-utils
          - zstd
        state: present
        update_cache: true

    - name: Dockerを起動して自動起動を有効にする
      ansible.builtin.systemd_service:
        name: docker
        enabled: true
        state: started

    - name: runner用ユーザーを作成する
      ansible.builtin.user:
        name: onebrc
        shell: /bin/sh
        groups: docker
        append: true
        create_home: true

    - name: runner用ディレクトリを作成する
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: onebrc
        group: onebrc
        mode: "{{ item.mode }}"
      loop:
        - { path: /opt/1brc, mode: "0755" }
        - { path: /opt/1brc/runner, mode: "0755" }
        - { path: /opt/1brc/apps/runner/image, mode: "0755" }
        - { path: /var/lib/1brc, mode: "0755" }
        - { path: /var/lib/1brc/jobs, mode: "0700" }
        - { path: /var/lib/1brc/data, mode: "0755" }
        - { path: /var/lib/1brc/ram-data, mode: "0755" }
        - { path: /var/lib/1brc/work, mode: "1777" }
        - { path: /home/onebrc/.ssh, mode: "0700" }

    - name: 計測用tmpfsをマウントする
      ansible.posix.mount:
        path: /var/lib/1brc/work
        src: tmpfs
        fstype: tmpfs
        opts: rw,nosuid,nodev,size=1G,mode=1777
        state: mounted

    - name: 入力データキャッシュ用tmpfsをマウントする
      ansible.posix.mount:
        path: /var/lib/1brc/ram-data
        src: tmpfs
        fstype: tmpfs
        opts: rw,nosuid,nodev,size=52G,mode=0755
        state: mounted

    - name: 入力データキャッシュをrunnerから書き込めるようにする
      ansible.builtin.file:
        path: /var/lib/1brc/ram-data
        state: directory
        owner: onebrc
        group: onebrc
        mode: "0755"

    - name: Bunをダウンロードする
      ansible.builtin.get_url:
        url: "https://github.com/oven-sh/bun/releases/download/bun-v{{ bun_version }}/bun-linux-x64.zip"
        dest: "/tmp/bun-v{{ bun_version }}-linux-x64.zip"
        checksum: "sha256:{{ bun_sha256 }}"
        mode: "0644"

    - name: Bunをインストールする
      ansible.builtin.unarchive:
        src: "/tmp/bun-v{{ bun_version }}-linux-x64.zip"
        dest: /opt/1brc
        remote_src: true
        creates: /opt/1brc/bun-linux-x64/bun

    - name: コンパイル済みrunnerを配置する
      ansible.builtin.copy:
        src: "../../apps/runner/dist/"
        dest: /opt/1brc/runner/
        owner: root
        group: root
        mode: "0644"

    - name: runner imageのbuild contextを配置する
      ansible.builtin.copy:
        src: "../../apps/runner/image/"
        dest: /opt/1brc/apps/runner/image/
        owner: root
        group: root
        mode: "0644"

    - name: runner imageをbuildする
      community.docker.docker_image_build:
        name: "{{ onebrc_runner_image }}"
        path: /opt/1brc
        dockerfile: apps/runner/image/Dockerfile
        rebuild: always

    - name: runnerの環境変数を設定する
      ansible.builtin.template:
        src: runner.env.j2
        dest: /etc/onebrc-runner.env
        owner: root
        group: onebrc
        mode: "0640"

    - name: forced-command gatewayを配置する
      ansible.builtin.template:
        src: onebrc-runner.j2
        dest: /usr/local/bin/onebrc-runner
        owner: root
        group: root
        mode: "0755"

    - name: application workerの公開鍵を許可する
      ansible.posix.authorized_key:
        user: onebrc
        key: "{{ onebrc_runner_public_key }}"
        key_options: 'command="/usr/local/bin/onebrc-runner",no-port-forwarding,no-agent-forwarding,no-X11-forwarding,no-pty'
        exclusive: true

    - name: 配置済み計測データを確認する
      ansible.builtin.stat:
        path: "/var/lib/1brc/data/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ onebrc_dataset_downloads.keys() | list }}"
      register: existing_datasets

    - name: R2から圧縮済み計測データをダウンロードする
      ansible.builtin.get_url:
        url: "{{ onebrc_dataset_downloads[item].url }}"
        dest: "/var/lib/1brc/data/{{ item }}.zst"
        checksum: "sha256:{{ onebrc_dataset_downloads[item].compressed_sha256 }}"
        owner: root
        group: root
        mode: "0600"
        timeout: 60
      loop: "{{ onebrc_dataset_downloads.keys() | list }}"
      loop_control:
        index_var: dataset_index
      when: (existing_datasets.results[dataset_index].stat.checksum | default("")) != onebrc_dataset_downloads[item].sha256
      no_log: true

    - name: 計測データを展開する
      ansible.builtin.command:
        argv:
          - zstd
          - --decompress
          - --force
          - -o
          - "/var/lib/1brc/data/{{ item }}"
          - "/var/lib/1brc/data/{{ item }}.zst"
      loop: "{{ onebrc_dataset_downloads.keys() | list }}"
      loop_control:
        index_var: dataset_index
      when: (existing_datasets.results[dataset_index].stat.checksum | default("")) != onebrc_dataset_downloads[item].sha256

    - name: ダウンロードした計測データのchecksumを検証する
      ansible.builtin.stat:
        path: "/var/lib/1brc/data/{{ item }}"
        checksum_algorithm: sha256
      register: downloaded_dataset
      failed_when: not downloaded_dataset.stat.exists or downloaded_dataset.stat.checksum != onebrc_dataset_downloads[item].sha256
      loop: "{{ onebrc_dataset_downloads.keys() | list }}"
      loop_control:
        index_var: dataset_index
      when: (existing_datasets.results[dataset_index].stat.checksum | default("")) != onebrc_dataset_downloads[item].sha256

    - name: 計測データの所有者と権限を設定する
      ansible.builtin.file:
        path: "/var/lib/1brc/data/{{ item }}"
        owner: onebrc
        group: onebrc
        mode: "0444"
      loop: "{{ onebrc_dataset_downloads.keys() | list }}"

    - name: 古いartifactを削除するserviceを配置する
      ansible.builtin.copy:
        dest: /etc/systemd/system/onebrc-cleanup.service
        mode: "0644"
        content: |
          [Unit]
          Description=放棄された1BRC artifactを削除する
          [Service]
          Type=oneshot
          ExecStart=/usr/bin/find /var/lib/1brc/jobs -mindepth 1 -maxdepth 1 -type d -mmin +1440 -exec rm -rf -- {} +

    - name: 古いartifactを削除するtimerを配置する
      ansible.builtin.copy:
        dest: /etc/systemd/system/onebrc-cleanup.timer
        mode: "0644"
        content: |
          [Unit]
          Description=1BRC artifactの削除を毎時実行する
          [Timer]
          OnBootSec=10min
          OnUnitActiveSec=1h
          [Install]
          WantedBy=timers.target

    - name: cleanup timerを起動して自動起動を有効にする
      ansible.builtin.systemd_service:
        name: onebrc-cleanup.timer
        enabled: true
        state: started
        daemon_reload: true
